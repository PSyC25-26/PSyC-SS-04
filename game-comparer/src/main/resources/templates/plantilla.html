<!DOCTYPE html>
<html lang="es" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/estilos.css}">
    <title>PlantillaTH</title>
</head>
<body th:fragment="bodyPlant">
    <header th:fragment="headerPlant">

        <h1>Bienvenido a tu comparador de juegos de confianza</h1>

        <h1 style="">CAZA OFERTAS GAMING</h1>

    </header>

    <nav th:fragment="navPlant" id="principal">
        <span id="botones_inicio">
            <a th:href="@{/iniciar}" class="boton_iniciar">Inicio</a>
            </a>
        </br>
            <a th:href="@{/buscar}" class="boton_iniciar">Buscador de juegos</a>
            </a>
        </br>
            <a th:href="@{/perfil}" class="boton_iniciar">Mi perfil</a>
            </a>
        </br>
            <a th:href="@{/wishlist/1}" class="boton_iniciar">Lista de deseados</a>
            </a>
        </br>
            <form method="post" th:action="@{/logout}" style="display:inline; padding: 5px;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">Cerrar sesión</button>
        </form> 
        </span>
        
        
    </nav>

    <nav th:insert="~{plantilla :: navPlant}"></nav>

    <div th:fragment="cuerpoExtra">

    </div>

    <footer th:fragment="footerPlant">   
        <h2>Todos los derechos reservados</h2>
        <ul>
            <li>Steam</li>
            <li>Epic Games Store</li>
            <li>Equipo desarrollador de Caza ofertas Gaming</li>
        </ul>
    </footer>
</body>
</html>
